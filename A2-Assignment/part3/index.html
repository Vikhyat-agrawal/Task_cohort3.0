<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScaleX - Insights & Blogs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="navbar">
            <div class="logo">
                <svg width="32" height="24" viewBox="0 0 32 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2 14 H14 L20 6 H30" stroke="white" stroke-width="4" stroke-linecap="round"/>
                    <path d="M30 10 H18 L12 18 H2" stroke="white" stroke-width="4" stroke-linecap="round"/>
                </svg>
                <span class="logo-text">ScaleX</span>
            </div>
            <nav class="nav-links">
                <a href="#">Home</a>
                <a href="#">About Us</a>
                <a href="#">Blogs</a>
                <a href="#">Contact Us</a>
            </nav>
            <div class="nav-action">
                <a href="#" class="btn-primary">Get Started</a>
            </div>
        </header>

        <main>
            <section class="hero-section">
                <h1 class="main-title">Insights & Blogs</h1>
                <div class="filters">
                    <button class="filter-btn active">All</button>
                    <button class="filter-btn">Tech</button>
                    <button class="filter-btn">SaaS</button>
                    <button class="filter-btn">Marketing</button>
                </div>
            </section>

            <section class="blog-grid">
                <article class="blog-card">
                    <div class="card-image">
                        <img src="./Cocktail glass image.png" alt="Cocktail Glass">
                    </div>
                    <div class="card-content">
                        <span class="tag">Tech</span>
                        <h2 class="card-title">The Ultimate Guide To SaaS Marketing</h2>
                        <p class="card-date">May 23, 2025</p>
                    </div>
                </article>

                <article class="blog-card">
                    <div class="card-image">
                        <img src="./Chair image.png" alt="Green Chair">
                    </div>
                    <div class="card-content">
                        <span class="tag">SaaS</span>
                        <h2 class="card-title">5 Key Trends In SaaS Growth For 2025</h2>
                        <p class="card-date">May 23, 2025</p>
                    </div>
                </article>

                <article class="blog-card">
                    <div class="card-image">
                        <img src="./Cat image.png" alt="Cat">
                    </div>
                    <div class="card-content">
                        <span class="tag">Marketing</span>
                        <h2 class="card-title">How Data-Driven Strategies Are Important</h2>
                        <p class="card-date">May 23, 2025</p>
                    </div>
                </article>
            </section>
        </main>
    </div>
</body>
</html>
