  <script>
    document.querySelectorAll('.heart-btn').forEach(btn => {
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        const liked = this.dataset.liked === 'true';
        this.dataset.liked = (!liked).toString();
        this.style.color = liked ? '' : '#ff6b8a';
        const path = this.querySelector('path');
        path.setAttribute('fill', liked ? 'none' : '#ff6b8a');
        path.setAttribute('stroke', liked ? 'currentColor' : '#ff6b8a');
      });
    });

    document.querySelectorAll('.bid-btn').forEach(btn => {
      btn.addEventListener('click', function () {
        this.textContent = 'Bid Placed ✓';
        this.style.background = 'linear-gradient(135deg, #6a3de8, #9b59e8)';
        this.disabled = true;
        this.style.opacity = '0.85';
      });
    });
  </script>

</html>
