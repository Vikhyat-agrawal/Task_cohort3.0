<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Squid Game – Official Series</title>
    <meta name="description"
        content="Squid Game – Action / Thriller / Drama Series directed by Dong-hyuk Hwang. Season 1: 9 Episodes." />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <div class="page-wrapper">

        <nav class="navbar">

            <a href="#" class="logo" id="logoLink">
                <div class="logo-emblem">
                    <svg viewBox="0 0 42 42" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="1.5" y="1.5" width="39" height="39" rx="5" stroke="#e91e8c" stroke-width="1.5" />
                        <text x="4" y="17" font-family="Outfit,sans-serif" font-size="13" font-weight="900"
                            fill="#fff">SQ</text>
                        <text x="4" y="33" font-family="Outfit,sans-serif" font-size="13" font-weight="900"
                            fill="#e91e8c">UID</text>
                        <circle cx="37" cy="5.5" r="3.5" fill="#e91e8c" />
                    </svg>
                </div>
                <div class="logo-wordmark">
                    <span class="top-word">SQUID</span>
                    <span class="bottom-word">GAME<span class="plus-sign">+</span></span>
                </div>
            </a>

            <ul class="nav-links">
                <li><a href="#" id="navAbout">About</a></li>
                <li><a href="#" id="navWatch" class="active">Watch now</a></li>
                <li><a href="#" id="navActors">Actors</a></li>
                <li><a href="#" id="navContact">Contact</a></li>
            </ul>

            <div class="hamburger" id="hamburgerBtn" role="button" aria-label="Open menu">
                <span></span>
                <span></span>
                <span></span>
            </div>

        </nav>

        <section class="hero" id="heroSection">

            <div class="bg-watermark" aria-hidden="true">GAME</div>

            <div class="right-brand" aria-hidden="true">
                <span class="right-brand-text">SQUID</span>
            </div>

            <div class="hero-left">

                <div class="hero-title-wrap">
                    <span class="deco-star-cyan" aria-hidden="true">✦</span>
                    <span class="deco-star-yellow" aria-hidden="true">★</span>

                    <h1 class="hero-title">
                        <span class="t-line1">SQUID</span>
                        <span class="t-line2">
                            GAM<span class="t-pink">E</span>
                            <span class="t-dash">—</span>
                        </span>
                    </h1>
                </div>

                <p class="hero-meta">
                    Action / Thriller / Drama Series directed by Dong-hyuk Hwang<br />
                    Season 1: 9 Episodes
                </p>

                <div class="hero-buttons">
                    <a href="#" class="btn-play" id="playNowBtn">
                        <div class="circle-icon">
                            <svg viewBox="0 0 10 12">
                                <path d="M0 0L10 6L0 12V0Z" />
                            </svg>
                        </div>
                        Play Now
                    </a>
                    <a href="#" class="btn-trailer" id="watchTrailerBtn">
                        <svg viewBox="0 0 10 12">
                            <path d="M0 0L10 6L0 12V0Z" />
                        </svg>
                        Watch Trailer
                    </a>
                </div>

            </div>

            <div class="scroll-col" aria-hidden="true">
                <span class="scroll-label">Scroll</span>
                <div class="scroll-line"></div>
            </div>

            <div class="hero-image-wrap">
                <img src="main_character.png" alt="Squid Game — Square Mask Guard Character" />
            </div>

            <div class="social-bar">

                <a href="#" aria-label="Twitter" id="socialTwitter">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.402 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.91-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z" />
                    </svg>
                </a>

                <a href="#" aria-label="Instagram" id="socialInstagram">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z" />
                    </svg>
                </a>

                <a href="#" aria-label="Facebook" id="socialFacebook">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
                    </svg>
                </a>

            </div>

        </section>

        <div class="thumbnails-section">
            <div class="thumbnails-row">

                <div class="thumb-card" id="thumbCard1">
                    <img src="guard_group.png" alt="Squid Game – Guard Group" />
                    <div class="thumb-badge">
                        <span class="series-lbl">SERIES</span>
                        <span class="squid-name">SQUID <span>GAME</span>&thinsp;—</span>
                    </div>
                    <div class="thumb-play">
                        <svg viewBox="0 0 10 12">
                            <path d="M0 0L10 6L0 12V0Z" />
                        </svg>
                    </div>
                </div>

                <div class="thumb-card" id="thumbCard2">
                    <img src="mask_man.png" alt="Squid Game – Neon Mask Character" />
                    <div class="thumb-play">
                        <svg viewBox="0 0 10 12">
                            <path d="M0 0L10 6L0 12V0Z" />
                        </svg>
                    </div>
                </div>

                <div class="thumb-card" id="thumbCard3">
                    <img src="three guard.png" alt="Squid Game – Three Teal Guards" />
                    <div class="thumb-play">
                        <svg viewBox="0 0 10 12">
                            <path d="M0 0L10 6L0 12V0Z" />
                        </svg>
                    </div>
                </div>

            </div>
        </div>

    </div>

</body>

</html>
